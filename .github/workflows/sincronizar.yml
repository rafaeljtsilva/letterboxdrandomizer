name: Sincronizar Watchlist do Letterboxd

on:
  schedule:
    - cron: '0 */6 * * *' # Corre automaticamente de 6 em 6 horas
  workflow_dispatch: # Permite-te correr o robô manualmente com um clique

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar o repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar o Cloudscraper
      run: pip install cloudscraper

    - name: Criar script de extração
      run: |
        cat << 'EOF' > extrair.py
        import cloudscraper
        import json
        import re

        username = 'rafaeljtsilva'
        url = f'https://letterboxd.com/{username}/watchlist/rss/'

        # Cria um scraper especial que contorna a proteção da Cloudflare
        scraper = cloudscraper.create_scraper()
        resposta = scraper.get(url)

        if resposta.status_code != 200:
            print(f"Erro ao passar pela Cloudflare. Status: {resposta.status_code}")
            exit(1)

        # Procura os títulos dos filmes no código do RSS
        matches = re.findall(r'<title><!\[CDATA\[(.*?)\]\]><\/title>', resposta.text)
        filmes = [t for t in matches if t != 'Watchlist']

        if not filmes:
            print("Não foi possível extrair filmes. O formato pode ter mudado.")
            exit(1)

        # Guarda os filmes num ficheiro JSON limpo
        with open('watchlist.json', 'w', encoding='utf-8') as f:
            json.dump(filmes, f, ensure_ascii=False, indent=2)
            
        print(f"Sucesso! {len(filmes)} filmes guardados em watchlist.json.")
        EOF

    - name: Executar o script Python
      run: python extrair.py

    - name: Guardar o ficheiro no repositório
      run: |
        git config --global user.name 'Letterboxd Bot'
        git config --global user.email 'bot@github.com'
        git add watchlist.json
        git commit -m "🤖 Sincronização automática com Cloudscraper" || exit 0
        git push
