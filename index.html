<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letterboxd Randomizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #14181c;
            color: #9ab;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1c252d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h1 { color: #fff; margin-bottom: 5px; }
        p.sub { color: #678; margin-bottom: 25px; font-size: 14px; }
        
        button.sortear {
            background: #00e054; color: #fff; padding: 16px 32px; font-size: 18px;
            border-radius: 5px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 25px;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(0, 224, 84, 0.3);
        }
        button.sortear:hover { background: #00b342; transform: translateY(-2px); }
        button.sortear:active { transform: translateY(0); }

        /* GRELHA DOS TRÊS RETÂNGULOS LADO A LADO */
        .grid-filmes {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
            min-height: 380px;
        }
        
        .filme-card {
            background: #24303c;
            width: 210px; /* Largura padrão de poster */
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
            border-bottom: 4px solid #ff8000;
            padding-bottom: 15px;
        }
        .filme-card:hover {
            transform: translateY(-5px);
        }
        
        /* Capa do Filme (Retângulo 2:3) */
        .filme-poster {
            width: 100%;
            height: 315px;
            object-fit: cover;
            background: #344454;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #678;
            font-size: 14px;
            font-weight: bold;
            padding: 10px;
            box-sizing: border-box;
            text-align: center;
            border: none;
        }

        .filme-info {
            padding: 15px 15px 0 15px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: center;
        }
        
        .filme-titulo {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 Letterboxd Watchlist Picker</h1>
    <p class="sub">A ler diretamente o teu ficheiro do GitHub de forma automática</p>
    
    <div>
        <button class="sortear" onclick="carregarESortear()">🎲 Sincronizar e Sortear 3</button>
    </div>
    
    <div id="lista-filmes" class="grid-filmes">
        <p style="color:#678; width:100%; padding-top: 50px;">Clica no botão acima para carregar a tua watchlist!</p>
    </div>
</div>

<script>
// ==========================================
// 🔑 COLA A TUA API KEY (v3 auth) DO TMDB AQUI:
const TMDB_API_KEY = 'TU_CHAVE_AQUI'; 
// ==========================================

let todosFilmes = [];

async function carregarESortear() {
    const container = document.getElementById('lista-filmes');
    
    // Se for a primeira vez, vai buscar o ficheiro ao repositório
    if (todosFilmes.length === 0) {
        container.innerHTML = '<p style="color:#ff8000; width:100%;">A ler watchlist.csv do GitHub...</p>';
        try {
            // Procura o ficheiro 'watchlist.csv' que está na mesma pasta do teu site
            const resposta = await fetch('watchlist.csv');
            if (!resposta.ok) {
                throw new Error("Não encontrámos o ficheiro 'watchlist.csv' no teu GitHub.");
            }
            const texto = await resposta.ok ? await resposta.text() : '';
            processarCSV(texto);
        } catch (erro) {
            container.innerHTML = `<p style="color:#ff4242; width:100%;">${erro.message}<br><br><span style="font-size:12px; color:#678;">Garante que subiste o ficheiro com o nome exato "watchlist.csv" para o teu repositório.</span></p>`;
            return;
        }
    }
    
    // Faz o sorteio dos filmes
    sortearFilmes();
}

function processarCSV(texto) {
    const linhas = texto.split('\n');
    todosFilmes = [];

    for (let i = 1; i < linhas.length; i++) {
        const linha = linhas[i].trim();
        if (!linha) continue;

        // Separa por vírgulas respeitando as aspas
        const colunas = inlineMatchCSV(linha);
        
        if (colunas && colunas[1] && colunas[3]) {
            let titulo = colunas[1].replace(/"/g, '').trim();
            let linkLetterboxd = colunas[3].replace(/"/g, '').trim();
            
            if (titulo !== "Name" && titulo !== "") {
                todosFilmes.push({
                    nome: titulo,
                    link: linkLetterboxd
                });
            }
        }
    }
}

function inlineMatchCSV(linha) {
    const arr = [];
    let c = '';
    let dentroAspas = false;
    for (let i = 0; i < linha.length; i++) {
        let char = linha[i];
        if (char === '"') {
            dentroAspas = !dentroAspas;
        } else if (char === ',' && !dentroAspas) {
            arr.push(c);
            c = '';
        } else {
            c += char;
        }
    }
    arr.push(c);
    return arr;
}

async function sortearFilmes() {
    const container = document.getElementById('lista-filmes');
    if (todosFilmes.length < 3) {
        container.innerHTML = '<p style="color:#ff4242; width:100%;">Precisas de pelo menos 3 filmes no teu ficheiro CSV!</p>';
        return;
    }
    
    container.innerHTML = '<p style="color:#ff8000; width:100%;">A carregar capas do TMDB...</p>'; 
    
    const sorteados = [...todosFilmes].sort(() => 0.5 - Math.random()).slice(0, 3);
    let htmlGerado = '';
    
    for (let filme of sorteados) {
        let posterUrl = "";
        
        if (TMDB_API_KEY !== 'TU_CHAVE_AQUI' && TMDB_API_KEY.trim() !== '') {
            posterUrl = await procurarPosterTMDB(filme.nome);
        }
        
        let elementoPoster = posterUrl 
            ? `<a href="${filme.link}" target="_blank"><img class="filme-poster" src="${posterUrl}" alt="Poster"></a>`
            : `<a href="${filme.link}" target="_blank" style="text-decoration:none;"><div class="filme-poster">🎬<br><br>${filme.nome}<br><br><span style="font-size:10px; color:#8a9aa8;">Abrir no Letterboxd</span></div></a>`;
            
        htmlGerado += `
            <div class="filme-card">
                ${elementoPoster}
                <div class="filme-info">
                    <div class="filme-titulo">
                        <a href="${filme.link}" target="_blank" style="color:#fff; text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='#00e054'" onmouseout="this.style.color='#fff'">
                            ${filme.nome}
                        </a>
                    </div>
                </div>
            </div>
        `;
    }
    
    container.innerHTML = htmlGerado;
}

async function procurarPosterTMDB(titulo) {
    try {
        const tituloLimpo = titulo.replace(/[^\w\sÀ-ÿ]/gi, '');
        const url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY.trim()}&query=${encodeURIComponent(tituloLimpo)}&include_adult=false&language=pt-PT`;
        
        const resposta = await fetch(url);
        if (resposta.status === 401 || resposta.status === 403) return "";
        
        const dados = await resposta.json();
        if (dados.results && dados.results.length > 0) {
            for (let resultado of dados.results) {
                if (resultado.poster_path) {
                    return `https://image.tmdb.org/t/p/w500${resultado.poster_path}`;
                }
            }
        }
    } catch (e) {
        console.error("Erro na ligação ao TMDB:", e);
    }
    return ""; 
}
</script>

</body>
</html>
