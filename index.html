<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letterboxd Randomizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #14181c;
            color: #9ab;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1c252d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h1 { color: #fff; }
        input, button {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            margin: 5px;
        }
        input { width: 60%; background: #2c3842; color: #fff; text-align: center; }
        button { background: #00e054; color: #fff; cursor: pointer; font-weight: bold; }
        button:hover { background: #00b342; }
        .filme-card {
            background: #24303c;
            margin: 15px 0;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #ff8000;
        }
        .filme-titulo { color: #fff; font-size: 18px; font-weight: bold; text-align: left; max-width: 70%; }
        #loading { color: #ff8000; font-weight: bold; display: none; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 Letterboxd Watchlist Picker</h1>
    <p>A extrair filmes diretamente da tua página de Shuffle!</p>
    
    <input type="text" id="username" value="rafaeljtsilva" placeholder="Teu username do Letterboxd">
    <br>
    <button onclick="carregarWatchlist()">🎲 Sortear 3 Filmes</button>
    
    <div id="loading">A abrir o Letterboxd e a pescar os teus filmes...</div>
    <div id="lista-filmes"></div>
</div>

<script>
let todosFilmes = [];

async function carregarWatchlist() {
    const username = document.getElementById('username').value.trim().toLowerCase();
    if (!username) return alert("Escreve o teu username!");
    
    document.getElementById('loading').style.display = 'block';
    document.getElementById('lista-filmes').innerHTML = '';

    const urlWatchlist = `https://letterboxd.com/${username}/watchlist/by/shuffle/`;
    
    // Mudámos para o corsproxy.io que não mascara nem deforma o HTML original
    const urlProxy = `https://corsproxy.io/?${encodeURIComponent(urlWatchlist)}`;

    try {
        const resposta = await fetch(urlProxy);
        if (!resposta.ok) throw new Error("Erro na rede");
        
        const htmlBruto = await resposta.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlBruto, "text/html");
        
        // Alvo 1: Divs que contêm o poster do filme (o Letterboxd guarda o título no 'data-film-slug' ou nos 'img')
        const posters = doc.querySelectorAll('.poster, .film-poster');
        
        todosFilmes = [];
        
        posters.forEach(div => {
            // Tenta ir buscar o nome de várias formas para garantir que apanha
            let titulo = "";
            
            const img = div.querySelector('img');
            if (img && img.getAttribute('alt')) {
                titulo = img.getAttribute('alt');
            } else if (div.getAttribute('data-film-slug')) {
                // Se não houver imagem, limpamos o slug (ex: "pulp-fiction" vira "Pulp Fiction")
                let slug = div.getAttribute('data-film-slug');
                titulo = slug.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
            }
            
            if (titulo && !todosFilmes.includes(titulo)) {
                todosFilmes.push(titulo);
            }
        });

        if (todosFilmes.length === 0) {
            // Se falhou tudo, vamos tentar procurar por links de filmes na página
            const links = doc.querySelectorAll('a');
            links.forEach(l => {
                if(l.href && l.href.includes('/film/')) {
                    let partes = l.href.split('/film/');
                    if(partes[1]) {
                        let nome = partes[1].replace(/\//g, '').split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                        if(nome && nome.length < 40 && !todosFilmes.includes(nome)) todosFilmes.push(nome);
                    }
                }
            });
        }

        if (todosFilmes.length === 0) {
            alert("O Letterboxd enviou uma página vazia. Tenta clicar no botão mais uma vez!");
        } else {
            sortearFilmesNativos();
        }
    } catch (erro) {
        console.error(erro);
        alert("O servidor falhou a responder. Tenta de novo!");
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
}

function sortearFilmesNativos() {
    if (todosFilmes.length < 3) {
        alert("Encontrámos poucos filmes na página. Garante que tens a lista bem preenchida!");
        return;
    }
    
    // Mostra os 3 primeiros da página baralhada
    const sorteados = todosFilmes.slice(0, 3);
    
    const container = document.getElementById('lista-filmes');
    container.innerHTML = '<h3>As tuas 3 opções aleatórias:</h3>';
    
    sorteados.forEach(filme => {
        container.innerHTML += `
            <div class="filme-card">
                <span class="filme-titulo">${filme}</span>
                <div>
                    <button style="margin:0 2px; padding:5px 10px; font-size:12px;" onclick="alert('Mais como este!')">👍 Mais</button>
                    <button style="margin:0 2px; padding:5px 10px; font-size:12px; background:#ff4242;" onclick="alert('Menos como este!')">👎 Menos</button>
                </div>
            </div>
        `;
    });
}
</script>

</body>
</html>
