<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letterboxd Randomizer</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #14181c; color: #9ab; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #1c252d; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h1 { color: #fff; }
        input, button { padding: 10px; font-size: 16px; border-radius: 5px; border: none; margin: 5px; }
        input { width: 60%; background: #2c3842; color: #fff; }
        button { background: #00e054; color: #fff; cursor: pointer; font-weight: bold; }
        button:hover { background: #00b342; }
        .filme-card { background: #24303c; margin: 15px 0; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #ff8000; }
        .filme-titulo { color: #fff; font-size: 18px; font-weight: bold; }
        #loading { color: #ff8000; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 Letterboxd Watchlist Picker</h1>
    <p>Insere o teu username para ir buscar a lista em tempo real:</p>
    
    <input type="text" id="username" value="rafaeljtsilva" placeholder="Teu username">
    <button onclick="carregarWatchlist()">🎲 Sortear 3 Filmes</button>
    
    <div id="loading">A ler os teus filmes do Letterboxd...</div>
    <div id="lista-filmes"></div>
</div>

<script>
let todosFilmes = [];

async function carregarWatchlist() {
    const username = document.getElementById('username').value.trim().toLowerCase();
    if (!username) return alert("Escreve o teu username!");
    
    document.getElementById('loading').style.display = 'block';
    document.getElementById('lista-filmes').innerHTML = '';

    // Usando uma API aberta da comunidade que faz o bypass ao scraping do Letterboxd
    const urlAPI = `https://letterboxd-watchlist-api.vercel.app/api/watchlist?username=${username}`;

    try {
        const resposta = await fetch(urlAPI);
        if (!resposta.ok) throw new Error();
        
        const dados = await resposta.json();
        
        // Mapeia os títulos dos filmes da resposta da API
        todosFilmes = dados.watchlist.map(filme => filme.title);

        if (todosFilmes.length === 0) {
            alert("Watchlist vazia ou perfil privado!");
        } else {
            sortearFilmes();
        }
    } catch (erro) {
        // Plano B: Se a API falhar por overload, usamos uma segunda API pública de backup
        try {
            const backupUrl = `https://corsproxy.io/?${encodeURIComponent('https://letterboxd.com/' + username + '/watchlist/rss/')}`;
            const res = await fetch(backupUrl);
            const text = await res.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(text, "text/xml");
            const items = xmlDoc.getElementsByTagName("item");
            
            todosFilmes = [];
            for (let i = 0; i < items.length; i++) {
                todosFilmes.push(items[i].getElementsByTagName("title")[0].textContent);
            }
            
            if (todosFilmes.length > 0) return sortearFilmes();
        } catch (e) {}
        
        alert("O Letterboxd barrou o acesso temporariamente. Tenta de novo dentro de instantes!");
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
}

function sortearFilmes() {
    if (todosFilmes.length < 3) {
        alert("Tens menos de 3 filmes na lista!");
        return;
    }
    
    const sorteados = [...todosFilmes].sort(() => 0.5 - Math.random()).slice(0, 3);
    const container = document.getElementById('lista-filmes');
    container.innerHTML = '<h3>As tuas 3 opções:</h3>';
    
    sorteados.forEach(filme => {
        container.innerHTML += `
            <div class="filme-card">
                <span class="filme-titulo">${filme}</span>
                <div>
                    <button style="margin:0 2px; padding:5px 10px; font-size:12px;" onclick="alert('Mais como este!')">👍 Mais</button>
                    <button style="margin:0 2px; padding:5px 10px; font-size:12px; background:#ff4242;" onclick="alert('Menos como este!')">👎 Menos</button>
                </div>
            </div>
        `;
    });
}
</script>

</body>
</html>
