<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letterboxd Randomizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #14181c;
            color: #9ab;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1c252d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h1 { color: #fff; margin-bottom: 20px; }
        
        .instrucoes {
            text-align: left;
            background: #24303c;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 14px;
            line-height: 1.6;
        }
        .instrucoes a { color: #00e054; text-decoration: none; font-weight: bold; }
        
        input[type="file"] {
            margin-bottom: 20px;
            color: #fff;
            background: #24303c;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            border: 1px dashed #445566;
        }
        
        button.sortear {
            background: #00e054; color: #fff; padding: 14px 28px; font-size: 18px;
            border-radius: 5px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 25px;
            transition: background 0.2s;
        }
        button.sortear:hover { background: #00b342; }

        /* GRELHA DOS TRÊS RETÂNGULOS LADO A LADO */
        .grid-filmes {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .filme-card {
            background: #24303c;
            width: 210px; /* Largura padrão de poster */
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
            border-bottom: 4px solid #ff8000;
            padding-bottom: 15px;
        }
        .filme-card:hover {
            transform: translateY(-5px);
        }
        
        /* Capa do Filme (Retângulo 2:3) */
        .filme-poster {
            width: 100%;
            height: 315px;
            object-fit: cover;
            background: #344454;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #678;
            font-size: 14px;
            font-weight: bold;
            padding: 10px;
            box-sizing: border-box;
            text-align: center;
            border: none;
        }

        .filme-info {
            padding: 15px 15px 0 15px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: center;
        }
        
        .filme-titulo {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 Letterboxd Watchlist Picker</h1>
    
    <div class="instrucoes">
        <strong>Como usar:</strong>
        <ol>
            <li>Vai a <a href="https://letterboxd.com/settings/data/" target="_blank">Letterboxd > Data</a> e clica em <strong>"Export Your Data"</strong>.</li>
            <li>Extrai o ZIP e carrega aqui o teu ficheiro <strong>watchlist.csv</strong>:</li>
        </ol>
    </div>
    
    <input type="file" id="csvFile" accept=".csv">
    
    <div id="zona-sorteio" style="display:none;">
        <button class="sortear" onclick="sortearFilmes()">🎲 Baralhar e Sortear 3</button>
    </div>
    
    <div id="lista-filmes" class="grid-filmes"></div>
</div>

<script>
// ==========================================
// 🔑 COLA A TUA API KEY (v3 auth) DO TMDB AQUI:
const TMDB_API_KEY = '15552b6ae873383f82e988c28c8a80ca'; 
// ==========================================

let todosFilmes = [];

document.getElementById('csvFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(evt) {
        processarCSV(evt.target.result);
    };
    reader.readAsText(file);
});

function processarCSV(texto) {
    const linhas = texto.split('\n');
    todosFilmes = [];

    for (let i = 1; i < linhas.length; i++) {
        const linha = linhas[i].trim();
        if (!linha) continue;

        // Separa por vírgulas, respeitando as aspas do CSV
        const colunas = inlineMatchCSV(linha);
        
        if (colunas && colunas[1] && colunas[3]) {
            let titulo = colunas[1].replace(/"/g, '').trim();
            let linkLetterboxd = colunas[3].replace(/"/g, '').trim();
            
            if (titulo !== "Name" && titulo !== "") {
                todosFilmes.push({
                    nome: titulo,
                    link: linkLetterboxd
                });
            }
        }
    }

    if (todosFilmes.length === 0) {
        alert("Ficheiro inválido. Garante que inseres o 'watchlist.csv'.");
    } else {
        document.getElementById('zona-sorteio').style.display = 'block';
        sortearFilmes();
    }
}

// Função auxiliar robusta para ler as linhas do CSV sem quebrar com espaços ou vírgulas em aspas
function inlineMatchCSV(linha) {
    const arr = [];
    let c = '';
    let dentroAspas = false;
    for (let i = 0; i < linha.length; i++) {
        let char = linha[i];
        if (char === '"') {
            dentroAspas = !dentroAspas;
        } else if (char === ',' && !dentroAspas) {
            arr.push(c);
            c = '';
        } else {
            c += char;
        }
    }
    arr.push(c);
    return arr;
}

async function sortearFilmes() {
    if (todosFilmes.length < 3) {
        alert("Precisas de pelo menos 3 filmes!");
        return;
    }
    
    // Baralha a lista e escolhe 3 sem qualquer restrição de histórico
    const sorteados = [...todosFilmes].sort(() => 0.5 - Math.random()).slice(0, 3);
    const container = document.getElementById('lista-filmes');
    container.innerHTML = '<p style="color:#ff8000; width:100%;">A carregar capas do TMDB...</p>'; 
    
    let htmlGerado = '';
    
    for (let filme of sorteados) {
        let posterUrl = "";
        
        if (TMDB_API_KEY !== 'TU_CHAVE_AQUI' && TMDB_API_KEY.trim() !== '') {
            posterUrl = await procurarPosterTMDB(filme.nome);
        }
        
        let elementoPoster = posterUrl 
            ? `<a href="${filme.link}" target="_blank"><img class="filme-poster" src="${posterUrl}" alt="Poster"></a>`
            : `<a href="${filme.link}" target="_blank" style="text-decoration:none;"><div class="filme-poster">🎬<br><br>${filme.nome}<br><br><span style="font-size:10px; color:#8a9aa8;">Abrir no Letterboxd</span></div></a>`;
            
        htmlGerado += `
            <div class="filme-card">
                ${elementoPoster}
                <div class="filme-info">
                    <div class="filme-titulo">
                        <a href="${filme.link}" target="_blank" style="color:#fff; text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='#00e054'" onmouseout="this.style.color='#fff'">
                            ${filme.nome}
                        </a>
                    </div>
                </div>
            </div>
        `;
    }
    
    container.innerHTML = htmlGerado;
}

async function procurarPosterTMDB(titulo) {
    try {
        const tituloLimpo = titulo.replace(/[^\w\sÀ-ÿ]/gi, '');
        const url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY.trim()}&query=${encodeURIComponent(tituloLimpo)}&include_adult=false&language=pt-PT`;
        
        const resposta = await fetch(url);
        if (resposta.status === 401 || resposta.status === 403) return "";
        
        const dados = await resposta.json();
        if (dados.results && dados.results.length > 0) {
            for (let resultado of dados.results) {
                if (resultado.poster_path) {
                    return `https://image.tmdb.org/t/p/w500${resultado.poster_path}`;
                }
            }
        }
    } catch (e) {
        console.error("Erro na ligação ao TMDB:", e);
    }
    return ""; 
}
</script>

</body>
</html>
