<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letterboxd Randomizer</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #14181c; color: #9ab; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #1c252d; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h1 { color: #fff; }
        button { padding: 10px 20px; font-size: 16px; border-radius: 5px; border: none; margin: 15px; background: #00e054; color: #fff; cursor: pointer; font-weight: bold; }
        button:hover { background: #00b342; }
        .filme-card { background: #24303c; margin: 15px 0; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #ff8000; }
        .filme-titulo { color: #fff; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 Letterboxd Watchlist Picker</h1>
    <p>Lista sincronizada automaticamente via GitHub Actions!</p>
    
    <button onclick="sortearFilmes()">🎲 Sortear 3 Filmes</button>
    
    <div id="lista-filmes"></div>
</div>

<script>
let todosFilmes = [];

// Carrega os filmes automaticamente assim que a página abre
async function iniciarApp() {
    try {
        // Lemos o ficheiro local que o GitHub Actions vai gerar para nós
        const resposta = await fetch('watchlist.json');
        if (!resposta.ok) throw new Error();
        todosFilmes = await resposta.json();
        console.log("Filmes carregados:", todosFilmes.length);
    } catch (erro) {
        document.getElementById('lista-filmes').innerHTML = "<p style='color: #ff4242;'>Ainda não existem filmes guardados. Ativa o GitHub Action primeiro!</p>";
    }
}

function sortearFilmes() {
    if (todosFilmes.length === 0) {
        alert("A carregar os filmes, espera um segundo ou verifica se o ficheiro watchlist.json existe.");
        return;
    }
    
    const sorteados = [...todosFilmes].sort(() => 0.5 - Math.random()).slice(0, 3);
    const container = document.getElementById('lista-filmes');
    container.innerHTML = '<h3>As tuas 3 opções:</h3>';
    
    sorteados.forEach(filme => {
        container.innerHTML += `
            <div class="filme-card">
                <span class="filme-titulo">${filme}</span>
                <div>
                    <button style="margin:0 2px; padding:5px 10px; font-size:12px;" onclick="alert('Mais como este!')">👍 Mais</button>
                    <button style="margin:0 2px; padding:5px 10px; font-size:12px; background:#ff4242;" onclick="alert('Menos como este!')">👎 Menos</button>
                </div>
            </div>
        `;
    });
}

// Executa ao abrir a página
iniciarApp();
</script>

</body>
</html>
