<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letterboxd Randomizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #14181c;
            color: #9ab;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1c252d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h1 { color: #fff; }
        .instrucoes {
            text-align: left;
            background: #24303c;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
        .instrucoes a { color: #00e054; text-decoration: none; font-weight: bold; }
        input[type="file"] {
            margin: 20px 0;
            color: #fff;
            background: #24303c;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .filme-card {
            background: #24303c;
            margin: 15px 0;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #ff8000;
        }
        .filme-titulo { color: #fff; font-size: 18px; font-weight: bold; text-align: left; }
        button.sortear {
            background: #00e054; color: #fff; padding: 12px 24px; font-size: 16px;
            border-radius: 5px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 15px;
        }
        button.sortear:hover { background: #00b342; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 Letterboxd Watchlist Picker</h1>
    
    <div class="instrucoes">
        <strong>Como o Letterboxd bloqueia o site, faz isto (leva 10 segundos):</strong>
        <ol>
            <li>Entra em <a href="https://letterboxd.com/settings/data/" target="_blank">Letterboxd Settings > Data</a> e clica em <strong>"Export Your Data"</strong>.</li>
            <li>Abre o ZIP descarregado e arrasta o ficheiro <strong>watchlist.csv</strong> para aqui:</li>
        </ol>
    </div>
    
    <input type="file" id="csvFile" accept=".csv">
    <div id="zona-sorteio" style="display:none;">
        <button class="sortear" onclick="sortearFilmes()">🎲 Baralhar e Sortear 3</button>
    </div>
    <div id="lista-filmes"></div>
</div>

<script>
let todosFilmes = [];

document.getElementById('csvFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(evt) {
        const conteudo = evt.target.result;
        processarCSV(conteudo);
    };
    reader.readAsText(file);
});

function processarCSV(texto) {
    const linhas = texto.split('\n');
    todosFilmes = [];

    // O CSV do Letterboxd tem a estrutura: Date, Name, Year, Letterboxd URL
    for (let i = 1; i < linhas.length; i++) {
        const linha = linhas[i].trim();
        if (!linha) continue;

        // Expressão regular para separar por vírgulas mas respeitar as aspas (filmes com vírgula no nome)
        const colunas = linha.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || linha.split(',');
        
        if (colunas && colunas[1]) {
            let titulo = colunas[1].replace(/"/g, ''); // Limpa as aspas extra
            if (titulo !== "Name") {
                todosFilmes.push(titulo);
            }
        }
    }

    if (todosFilmes.length === 0) {
        alert("Não encontrámos filmes. Tens a certeza que inseriste o ficheiro 'watchlist.csv'?");
    } else {
        document.getElementById('zona-sorteio').style.display = 'block';
        sortearFilmes();
    }
}

function sortearFilmes() {
    if (todosFilmes.length < 3) {
        alert("Precisas de pelo menos 3 filmes na tua lista!");
        return;
    }
    
    // Baralha a lista completa do CSV e escolhe 3
    const sorteados = [...todosFilmes].sort(() => 0.5 - Math.random()).slice(0, 3);
    
    const container = document.getElementById('lista-filmes');
    container.innerHTML = '<h3>As tuas 3 opções aleatórias:</h3>';
    
    sorteados.forEach(filme => {
        container.innerHTML += `
            <div class="filme-card">
                <span class="filme-titulo">${filme}</span>
                <div>
                    <button style="margin:0 2px; padding:5px 10px; font-size:12px; border:none; border-radius:3px; background:#00e054; color:white; font-weight:bold; cursor:pointer;" onclick="alert('Mais como este!')">👍</button>
                    <button style="margin:0 2px; padding:5px 10px; font-size:12px; border:none; border-radius:3px; background:#ff4242; color:white; font-weight:bold; cursor:pointer;" onclick="alert('Menos como este!')">👎</button>
                </div>
            </div>
        `;
    });
}
</script>

</body>
</html>
